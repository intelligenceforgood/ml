# PIPELINE DEFINITION
# Name: i4g-ml-training-pipeline
# Description: End-to-end training pipeline: data prep → train → evaluate → register → deploy
# Inputs:
#    capability: str [Default: 'classification']
#    config_path: str [Default: '']
#    container_uri: str [Default: '']
#    dataset_id: str [Default: 'i4g_ml']
#    dataset_version: int [Default: 1.0]
#    endpoint_name: str [Default: 'serving-dev']
#    experiment_name: str [Default: '']
#    golden_set_uri: str [Default: 'gs://i4g-ml-data/datasets/classification/golden/test.jsonl']
#    machine_type: str [Default: 'n1-standard-4']
#    max_per_axis_regression: float [Default: 0.05]
#    max_replicas: int [Default: 1.0]
#    min_overall_f1: float [Default: 0.0]
#    min_replicas: int [Default: 0.0]
#    project_id: str [Default: 'i4g-ml']
#    region: str [Default: 'us-central1']
#    serving_container_uri: str [Default: '']
components:
  comp-deploy-model:
    executorLabel: exec-deploy-model
    inputDefinitions:
      parameters:
        endpoint_name:
          parameterType: STRING
        machine_type:
          parameterType: STRING
        max_replicas:
          parameterType: NUMBER_INTEGER
        min_replicas:
          parameterType: NUMBER_INTEGER
        model_name:
          parameterType: STRING
        project_id:
          parameterType: STRING
        region:
          parameterType: STRING
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
    inputDefinitions:
      parameters:
        golden_set_uri:
          parameterType: STRING
        max_per_axis_regression:
          parameterType: NUMBER_DOUBLE
        min_overall_f1:
          parameterType: NUMBER_DOUBLE
        model_uri:
          parameterType: STRING
    outputDefinitions:
      parameters:
        metrics_json:
          parameterType: STRING
        passed:
          parameterType: STRING
  comp-prepare-dataset:
    executorLabel: exec-prepare-dataset
    inputDefinitions:
      parameters:
        capability:
          parameterType: STRING
        dataset_id:
          parameterType: STRING
        dataset_version:
          parameterType: NUMBER_INTEGER
        project_id:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-register-model:
    executorLabel: exec-register-model
    inputDefinitions:
      parameters:
        capability:
          parameterType: STRING
        display_name:
          parameterType: STRING
        eval_passed:
          parameterType: STRING
        model_uri:
          parameterType: STRING
        project_id:
          parameterType: STRING
        region:
          parameterType: STRING
        serving_container_uri:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      parameters:
        config_path:
          parameterType: STRING
        container_uri:
          parameterType: STRING
        dataset_gcs_path:
          parameterType: STRING
        experiment_name:
          parameterType: STRING
        project_id:
          parameterType: STRING
        region:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-deploy-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_model(\n    project_id: str,\n    region: str,\n    model_name:\
          \ str,\n    endpoint_name: str,\n    machine_type: str,\n    min_replicas:\
          \ int,\n    max_replicas: int,\n) -> None:\n    \"\"\"Deploy a registered\
          \ model to a Vertex AI Endpoint.\"\"\"\n    if model_name == \"SKIPPED\"\
          :\n        return\n\n    from google.cloud import aiplatform\n\n    aiplatform.init(project=project_id,\
          \ location=region)\n    model = aiplatform.Model(model_name=model_name)\n\
          \    endpoints = aiplatform.Endpoint.list(filter=f'display_name=\"{endpoint_name}\"\
          ')\n    if not endpoints:\n        raise ValueError(f\"Endpoint '{endpoint_name}'\
          \ not found\")\n\n    model.deploy(\n        endpoint=endpoints[0],\n  \
          \      machine_type=machine_type,\n        min_replica_count=min_replicas,\n\
          \        max_replica_count=max_replicas,\n        traffic_percentage=100,\n\
          \    )\n\n"
        image: us-central1-docker.pkg.dev/i4g-ml/containers/pipeline-base:dev
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    model_uri: str,\n    golden_set_uri: str,\n\
          \    min_overall_f1: float,\n    max_per_axis_regression: float,\n) -> NamedTuple(\"\
          EvalOutputs\", [(\"passed\", str), (\"metrics_json\", str)]):\n    \"\"\"\
          Evaluate a trained model against the golden test set.\n\n    Downloads model\
          \ artifacts + golden test JSONL from GCS, runs inference\n    on each sample,\
          \ computes per-axis P/R/F1, and applies the eval gate.\n    \"\"\"\n   \
          \ import json\n    import tempfile\n    from pathlib import Path\n\n   \
          \ from google.cloud import storage as gcs\n\n    # \u2500\u2500 Download\
          \ golden test set \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    def _download_gcs_file(uri:\
          \ str, dest: Path) -> None:\n        \"\"\"Download a single GCS object\
          \ to a local path.\"\"\"\n        without_scheme = uri[5:]\n        bucket_name,\
          \ _, blob_path = without_scheme.partition(\"/\")\n        client = gcs.Client()\n\
          \        bucket = client.bucket(bucket_name)\n        blob = bucket.blob(blob_path)\n\
          \        dest.parent.mkdir(parents=True, exist_ok=True)\n        blob.download_to_filename(str(dest))\n\
          \n    def _download_gcs_prefix(uri: str, dest: Path) -> None:\n        \"\
          \"\"Download all objects under a GCS prefix to a local directory.\"\"\"\n\
          \        without_scheme = uri[5:]\n        bucket_name, _, prefix = without_scheme.partition(\"\
          /\")\n        prefix = prefix.rstrip(\"/\")\n        client = gcs.Client()\n\
          \        bucket = client.bucket(bucket_name)\n        blobs = list(bucket.list_blobs(prefix=prefix))\n\
          \        for blob in blobs:\n            rel = blob.name[len(prefix) :].lstrip(\"\
          /\")\n            if not rel:\n                continue\n            local_path\
          \ = dest / rel\n            local_path.parent.mkdir(parents=True, exist_ok=True)\n\
          \            blob.download_to_filename(str(local_path))\n\n    # \u2500\u2500\
          \ Load golden test data \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \n    golden_path = Path(tempfile.mkdtemp()) / \"test.jsonl\"\n    _download_gcs_file(golden_set_uri,\
          \ golden_path)\n\n    golden_data: list[dict] = []\n    with open(golden_path)\
          \ as f:\n        for line in f:\n            line = line.strip()\n     \
          \       if line:\n                golden_data.append(json.loads(line))\n\
          \n    if not golden_data:\n        metrics = {\n            \"overall_f1\"\
          : 0.0,\n            \"overall_precision\": 0.0,\n            \"overall_recall\"\
          : 0.0,\n            \"per_axis\": {},\n            \"eval_gate_passed\"\
          : False,\n            \"error\": \"Empty golden test set\",\n        }\n\
          \        return (\"false\", json.dumps(metrics))\n\n    # \u2500\u2500 Download\
          \ and detect model \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    model_dir = Path(tempfile.mkdtemp())\n\
          \    _download_gcs_prefix(model_uri.rstrip(\"/\") + \"/\", model_dir)\n\n\
          \    # Load label map\n    label_map_path = model_dir / \"label_map.json\"\
          \n    if not label_map_path.exists():\n        metrics = {\n           \
          \ \"overall_f1\": 0.0,\n            \"overall_precision\": 0.0,\n      \
          \      \"overall_recall\": 0.0,\n            \"per_axis\": {},\n       \
          \     \"eval_gate_passed\": False,\n            \"error\": \"label_map.json\
          \ not found in model artifacts\",\n        }\n        return (\"false\"\
          , json.dumps(metrics))\n\n    with open(label_map_path) as f:\n        label_map\
          \ = json.load(f)\n\n    # Detect model type and run inference\n    is_xgboost\
          \ = (model_dir / \"xgboost_model.json\").exists()\n    is_pytorch = (model_dir\
          \ / \"model\").is_dir() or (model_dir / \"config.json\").exists()\n\n  \
          \  predictions: list[dict[str, str]] = []\n    ground_truth: list[dict[str,\
          \ str]] = []\n\n    if is_pytorch:\n        # Install PyTorch + transformers\
          \ at runtime in this lightweight component.\n        # For KFP, this runs\
          \ inside a container that has pip available.\n        import subprocess\n\
          \n        subprocess.check_call(\n            [\"pip\", \"install\", \"\
          --quiet\", \"torch\", \"transformers\"],\n            stdout=subprocess.DEVNULL,\n\
          \        )\n\n        import importlib\n\n        from transformers import\
          \ AutoModelForSequenceClassification, AutoTokenizer\n\n        torch = importlib.import_module(\"\
          torch\")\n\n        pt_model_dir = model_dir / \"model\" if (model_dir /\
          \ \"model\").is_dir() else model_dir\n        tokenizer = AutoTokenizer.from_pretrained(str(pt_model_dir))\n\
          \        model = AutoModelForSequenceClassification.from_pretrained(str(pt_model_dir))\n\
          \        model.eval()\n\n        for sample in golden_data:\n          \
          \  text = sample.get(\"text\", \"\")\n            gt_labels = sample.get(\"\
          labels\", {})\n            ground_truth.append(gt_labels)\n\n          \
          \  inputs = tokenizer(text, return_tensors=\"pt\", truncation=True, max_length=512)\n\
          \            with torch.no_grad():\n                logits = model(**inputs).logits\n\
          \            probs = torch.softmax(logits, dim=-1).squeeze(0)\n\n      \
          \      pred: dict[str, str] = {}\n            offset = 0\n            for\
          \ axis, labels in label_map.items():\n                n = len(labels)\n\
          \                axis_probs = probs[offset : offset + n]\n             \
          \   best_idx = int(torch.argmax(axis_probs).item())\n                pred[axis]\
          \ = labels[best_idx]\n                offset += n\n            predictions.append(pred)\n\
          \n    elif is_xgboost:\n        import subprocess\n\n        subprocess.check_call(\n\
          \            [\"pip\", \"install\", \"--quiet\", \"xgboost\", \"numpy\"\
          ],\n            stdout=subprocess.DEVNULL,\n        )\n        import importlib\n\
          \n        xgb = importlib.import_module(\"xgboost\")\n        np = importlib.import_module(\"\
          numpy\")\n\n        booster = xgb.Booster()\n        booster.load_model(str(model_dir\
          \ / \"xgboost_model.json\"))\n\n        # Use training feature order if\
          \ available\n        feature_cols_path = model_dir / \"feature_cols.json\"\
          \n        saved_feature_cols: list[str] | None = None\n        if feature_cols_path.exists():\n\
          \            with open(feature_cols_path) as fc:\n                saved_feature_cols\
          \ = json.load(fc)\n\n        for sample in golden_data:\n            gt_labels\
          \ = sample.get(\"labels\", {})\n            ground_truth.append(gt_labels)\n\
          \n            features = sample.get(\"features\", {})\n            feature_keys\
          \ = saved_feature_cols or sorted(features.keys())\n            values =\
          \ [float(features.get(k) or 0) for k in feature_keys]\n            dmat\
          \ = xgb.DMatrix(np.array([values], dtype=np.float32), feature_names=feature_keys)\n\
          \            raw_pred = booster.predict(dmat)\n\n            pred: dict[str,\
          \ str] = {}\n            offset = 0\n            for axis, labels in label_map.items():\n\
          \                n = len(labels)\n                axis_probs = raw_pred[0][offset\
          \ : offset + n] if raw_pred.ndim > 1 else raw_pred[offset : offset + n]\n\
          \                best_idx = int(np.argmax(axis_probs))\n               \
          \ pred[axis] = labels[best_idx]\n                offset += n\n         \
          \   predictions.append(pred)\n\n    else:\n        metrics = {\n       \
          \     \"overall_f1\": 0.0,\n            \"overall_precision\": 0.0,\n  \
          \          \"overall_recall\": 0.0,\n            \"per_axis\": {},\n   \
          \         \"eval_gate_passed\": False,\n            \"error\": \"Unknown\
          \ model type in artifacts\",\n        }\n        return (\"false\", json.dumps(metrics))\n\
          \n    # \u2500\u2500 Compute metrics (inline \u2014 avoids importing ml\
          \ package in KFP) \u2500\u2500\u2500\u2500\n    all_axes: set[str] = set()\n\
          \    for gt in ground_truth:\n        all_axes.update(gt.keys())\n\n   \
          \ axis_tp: dict[str, int] = {a: 0 for a in all_axes}\n    axis_fp: dict[str,\
          \ int] = {a: 0 for a in all_axes}\n    axis_fn: dict[str, int] = {a: 0 for\
          \ a in all_axes}\n    axis_support: dict[str, int] = {a: 0 for a in all_axes}\n\
          \n    for pred_item, gt_item in zip(predictions, ground_truth, strict=False):\n\
          \        for axis in all_axes:\n            gt_label = gt_item.get(axis)\n\
          \            pred_label = pred_item.get(axis)\n            if gt_label is\
          \ not None:\n                axis_support[axis] += 1\n                if\
          \ pred_label == gt_label:\n                    axis_tp[axis] += 1\n    \
          \            else:\n                    axis_fn[axis] += 1\n           \
          \         if pred_label is not None:\n                        axis_fp[axis]\
          \ += 1\n            elif pred_label is not None:\n                axis_fp[axis]\
          \ += 1\n\n    per_axis: dict[str, dict[str, float]] = {}\n    f1_scores:\
          \ list[float] = []\n    precisions: list[float] = []\n    recalls: list[float]\
          \ = []\n    weights: list[int] = []\n\n    for axis in sorted(all_axes):\n\
          \        tp, fp, fn = axis_tp[axis], axis_fp[axis], axis_fn[axis]\n    \
          \    p = tp / (tp + fp) if (tp + fp) > 0 else 0.0\n        r = tp / (tp\
          \ + fn) if (tp + fn) > 0 else 0.0\n        f1 = (2 * p * r) / (p + r) if\
          \ (p + r) > 0 else 0.0\n        support = axis_support[axis]\n        per_axis[axis]\
          \ = {\"precision\": p, \"recall\": r, \"f1\": f1, \"support\": support}\n\
          \        f1_scores.append(f1)\n        precisions.append(p)\n        recalls.append(r)\n\
          \        weights.append(support)\n\n    total_weight = sum(weights)\n  \
          \  if total_weight > 0:\n        overall_f1 = sum(f * w for f, w in zip(f1_scores,\
          \ weights, strict=False)) / total_weight\n        overall_p = sum(p * w\
          \ for p, w in zip(precisions, weights, strict=False)) / total_weight\n \
          \       overall_r = sum(r * w for r, w in zip(recalls, weights, strict=False))\
          \ / total_weight\n    else:\n        overall_f1 = overall_p = overall_r\
          \ = 0.0\n\n    # \u2500\u2500 Eval gate \u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\n    gate_passed = overall_f1 >= min_overall_f1\n\n    metrics\
          \ = {\n        \"overall_f1\": overall_f1,\n        \"overall_precision\"\
          : overall_p,\n        \"overall_recall\": overall_r,\n        \"per_axis\"\
          : per_axis,\n        \"total_samples\": len(predictions),\n        \"eval_gate_passed\"\
          : gate_passed,\n    }\n\n    passed = \"true\" if gate_passed else \"false\"\
          \n    return (passed, json.dumps(metrics))\n\n"
        image: us-central1-docker.pkg.dev/i4g-ml/containers/pipeline-base:dev
    exec-prepare-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - prepare_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef prepare_dataset(\n    project_id: str,\n    dataset_id: str,\n\
          \    capability: str,\n    dataset_version: int,\n) -> str:\n    \"\"\"\
          Verify pre-exported dataset splits exist in GCS.\n\n    Returns the GCS\
          \ path prefix for the dataset version.\n    \"\"\"\n    from google.cloud\
          \ import storage as gcs\n\n    bucket_name = \"i4g-ml-data\"\n    prefix\
          \ = f\"datasets/{capability}/v{dataset_version}\"\n    client = gcs.Client()\n\
          \    bucket = client.bucket(bucket_name)\n\n    for split in (\"train\"\
          , \"eval\", \"test\"):\n        blob = bucket.blob(f\"{prefix}/{split}.jsonl\"\
          )\n        if not blob.exists():\n            raise FileNotFoundError(f\"\
          Missing dataset split: gs://{bucket_name}/{prefix}/{split}.jsonl\")\n\n\
          \    return f\"gs://{bucket_name}/{prefix}\"\n\n"
        image: us-central1-docker.pkg.dev/i4g-ml/containers/pipeline-base:dev
    exec-register-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - register_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef register_model(\n    project_id: str,\n    region: str,\n   \
          \ model_uri: str,\n    display_name: str,\n    serving_container_uri: str,\n\
          \    eval_passed: str,\n    capability: str,\n) -> str:\n    \"\"\"Register\
          \ a trained model in Vertex AI Model Registry.\n\n    Returns the model\
          \ resource name or 'SKIPPED'.\n    \"\"\"\n    if eval_passed != \"true\"\
          :\n        return \"SKIPPED\"\n\n    from google.cloud import aiplatform\n\
          \n    aiplatform.init(project=project_id, location=region)\n    model =\
          \ aiplatform.Model.upload(\n        display_name=display_name,\n       \
          \ artifact_uri=model_uri,\n        serving_container_image_uri=serving_container_uri,\n\
          \        serving_container_health_route=\"/health\",\n        serving_container_predict_route=\"\
          /predict/classify\",\n        labels={\"stage\": \"candidate\", \"capability\"\
          : capability},\n    )\n    return model.resource_name\n\n"
        image: us-central1-docker.pkg.dev/i4g-ml/containers/pipeline-base:dev
    exec-train-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.13.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    project_id: str,\n    region: str,\n    container_uri:\
          \ str,\n    config_path: str,\n    dataset_gcs_path: str,\n    experiment_name:\
          \ str,\n) -> str:\n    \"\"\"Submit a Vertex AI CustomJob for model training.\n\
          \n    Returns the GCS URI of the model artifacts.\n    \"\"\"\n    from\
          \ google.cloud import aiplatform\n\n    aiplatform.init(\n        project=project_id,\n\
          \        location=region,\n        staging_bucket=\"gs://i4g-ml-vertex-pipelines-us-central1\"\
          ,\n        experiment=experiment_name,\n    )\n\n    model_output = f\"\
          gs://i4g-ml-data/models/{experiment_name}/\"\n    job = aiplatform.CustomJob(\n\
          \        display_name=f\"train-{experiment_name}\",\n        worker_pool_specs=[\n\
          \            {\n                \"machine_spec\": {\n                  \
          \  \"machine_type\": \"n1-highmem-4\",\n                },\n           \
          \     \"replica_count\": 1,\n                \"container_spec\": {\n   \
          \                 \"image_uri\": container_uri,\n                    \"\
          args\": [\n                        \"--config\",\n                     \
          \   config_path,\n                        \"--dataset\",\n             \
          \           dataset_gcs_path,\n                        \"--experiment\"\
          ,\n                        experiment_name,\n                        \"\
          --output\",\n                        model_output,\n                   \
          \ ],\n                },\n            }\n        ],\n    )\n    job.run(experiment=experiment_name)\n\
          \n    return f\"gs://i4g-ml-data/models/{experiment_name}/\"\n\n"
        image: us-central1-docker.pkg.dev/i4g-ml/containers/pipeline-base:dev
pipelineInfo:
  description: "End-to-end training pipeline: data prep \u2192 train \u2192 evaluate\
    \ \u2192 register \u2192 deploy"
  name: i4g-ml-training-pipeline
root:
  dag:
    tasks:
      deploy-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-deploy-model
        dependentTasks:
        - register-model
        inputs:
          parameters:
            endpoint_name:
              componentInputParameter: endpoint_name
            machine_type:
              componentInputParameter: machine_type
            max_replicas:
              componentInputParameter: max_replicas
            min_replicas:
              componentInputParameter: min_replicas
            model_name:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: register-model
            project_id:
              componentInputParameter: project_id
            region:
              componentInputParameter: region
        taskInfo:
          name: deploy-model
      evaluate-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate-model
        dependentTasks:
        - train-model
        inputs:
          parameters:
            golden_set_uri:
              componentInputParameter: golden_set_uri
            max_per_axis_regression:
              componentInputParameter: max_per_axis_regression
            min_overall_f1:
              componentInputParameter: min_overall_f1
            model_uri:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: train-model
        taskInfo:
          name: evaluate-model
      prepare-dataset:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-prepare-dataset
        inputs:
          parameters:
            capability:
              componentInputParameter: capability
            dataset_id:
              componentInputParameter: dataset_id
            dataset_version:
              componentInputParameter: dataset_version
            project_id:
              componentInputParameter: project_id
        taskInfo:
          name: prepare-dataset
      register-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-register-model
        dependentTasks:
        - evaluate-model
        - train-model
        inputs:
          parameters:
            capability:
              componentInputParameter: capability
            display_name:
              componentInputParameter: experiment_name
            eval_passed:
              taskOutputParameter:
                outputParameterKey: passed
                producerTask: evaluate-model
            model_uri:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: train-model
            project_id:
              componentInputParameter: project_id
            region:
              componentInputParameter: region
            serving_container_uri:
              componentInputParameter: serving_container_uri
        taskInfo:
          name: register-model
      train-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-model
        dependentTasks:
        - prepare-dataset
        inputs:
          parameters:
            config_path:
              componentInputParameter: config_path
            container_uri:
              componentInputParameter: container_uri
            dataset_gcs_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: prepare-dataset
            experiment_name:
              componentInputParameter: experiment_name
            project_id:
              componentInputParameter: project_id
            region:
              componentInputParameter: region
        taskInfo:
          name: train-model
  inputDefinitions:
    parameters:
      capability:
        defaultValue: classification
        isOptional: true
        parameterType: STRING
      config_path:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      container_uri:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      dataset_id:
        defaultValue: i4g_ml
        isOptional: true
        parameterType: STRING
      dataset_version:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      endpoint_name:
        defaultValue: serving-dev
        isOptional: true
        parameterType: STRING
      experiment_name:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      golden_set_uri:
        defaultValue: gs://i4g-ml-data/datasets/classification/golden/test.jsonl
        isOptional: true
        parameterType: STRING
      machine_type:
        defaultValue: n1-standard-4
        isOptional: true
        parameterType: STRING
      max_per_axis_regression:
        defaultValue: 0.05
        isOptional: true
        parameterType: NUMBER_DOUBLE
      max_replicas:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      min_overall_f1:
        defaultValue: 0.0
        isOptional: true
        parameterType: NUMBER_DOUBLE
      min_replicas:
        defaultValue: 0.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      project_id:
