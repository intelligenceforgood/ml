# Classification training config — XGBoost tabular
# Uses pre-computed BigQuery features (no text tokenization)
#
# When to use XGBoost vs PyTorch:
#   - XGBoost: fast training, low resource, good baseline, requires pre-computed features
#   - PyTorch (Gemma 2B LoRA): leverages raw text, higher accuracy ceiling, GPU required

model_id: "classification-xgboost-v1"
capability: "classification"
base_model: "xgboost"
framework: "xgboost"
training_type: "full"

hyperparameters:
  epochs: 100 # XGBoost num_boost_round
  batch_size: 0 # Not applicable for XGBoost
  learning_rate: 0.1 # eta
  warmup_ratio: 0.0 # Not applicable

# XGBoost-specific parameters (passed to train container via config)
xgboost_params:
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 1
  objective: "multi:softprob"
  eval_metric: "mlogloss"
  early_stopping_rounds: 10

label_schema:
  INTENT:
    - INTENT.ROMANCE
    - INTENT.INVESTMENT
    - INTENT.IMPERSONATION
    - INTENT.TECH_SUPPORT
    - INTENT.SHOPPING
    - INTENT.EMPLOYMENT
    - INTENT.OTHER
  CHANNEL:
    - CHANNEL.SOCIAL_MEDIA
    - CHANNEL.EMAIL
    - CHANNEL.PHONE
    - CHANNEL.WEBSITE
    - CHANNEL.MESSAGING
    - CHANNEL.OTHER

eval_gate:
  min_overall_f1: 0.0 # Phase 1: establishing XGBoost baseline
  max_per_axis_regression: 0.05

resources:
  machine_type: "n1-standard-4"
  gpu_type: "" # XGBoost uses CPU only
  gpu_count: 0

data_bucket: "i4g-ml-data"
